server:
  port: 8081
spring:
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: hmdianping
    password: 123456
    listener:
      simple:
        retry:
          enabled: true   # 开启消费者失败重试
          initial-interval: 1000ms    # 初始的失败等待时长为1秒
          multiplier: 1   # 失败的等待时长倍数，下一次等待时长 = multiplier * last-interval
          max-attempts: 3 # 失败最大重试次数
          stateless: true # true代表无状态 false为有状态 如果业务中包含事务，就为false
        concurrency: 1
        max-concurrency: 1
        acknowledge-mode: manual
        prefetch: 1
    publisher-confirm-type: correlated    # 开启publisher confirm 机制，设置confirm类型
    publisher-returns: true         # 开启publisher return机制
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 050208@lyl
  redis:
    host: 127.0.0.1
    port: 6379
    password: 123456
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
      shutdown-timeout: 200ms
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
canal:
  host: 127.0.0.1
  port: 11111
  destination: hmdp
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug

